[package]
name = "ic-reactor-program-ir"
version = "0.1.0"
edition = "2021"
rust-version = "1.78"
description = "Canonical language-neutral Program IR model for IC Reactor."
license = "MIT"

[lib]
name = "ic_reactor_program_ir"
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }

[dev-dependencies]
serde_json = "1.0.150"
