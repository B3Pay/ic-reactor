name: Size Check

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "pnpm-lock.yaml"

jobs:
  size:
    name: Bundle Size
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (excluding parser)
        run: pnpm build

      - name: Check bundle size
        run: pnpm size

      - name: Analyze bundle (if size increased)
        if: failure()
        run: pnpm size:analyze
