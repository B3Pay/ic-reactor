name: Release

on:
  push:
    tags:
      - "v[1-9]*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release to npm
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix:
        workspace:
          - packages/core
          - packages/react
          - packages/candid
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Upgrade npm to v11 (required for OIDC)
        run: npm i -g npm@^11.5.1 && npm --version

      - name: Install dependencies
        # Install only this v3 package and its dependency graph. In particular,
        # keep unreleased v4 workspaces such as @ic-reactor/cod out of v3 tags.
        run: pnpm install --frozen-lockfile --filter "{./${{ matrix.workspace }}}..."

      - name: Cache Rust dependencies
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/parser/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('packages/parser/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # parser is released separately via the release-tools workflow, so we don't need to
      # build it here. keeping this step slows down the job.

      # Build this publishable package and the workspace packages it depends on.
      - name: Build package dependency graph
        run: pnpm -r --filter "{./${{ matrix.workspace }}}..." build

      - name: Run package tests
        run: pnpm --filter "{./${{ matrix.workspace }}}" test

      - name: Determine publish tag
        run: |
          # Determine publish tag based on the git tag name.
          # Default to 'latest' for stable tags (e.g., v3.0.0). If tag contains a hyphen (e.g., v3.0.0-beta.1), use 'beta'.
          REF=${GITHUB_REF##*/}
          echo "Detected tag: $REF"
          if [[ "$REF" == *-* ]]; then
            echo "TAG=beta" >> $GITHUB_ENV
          else
            echo "TAG=latest" >> $GITHUB_ENV
          fi

      - name: Publish to npm (uses npm CLI for OIDC)
        # pnpm pack converts workspace:^ to real versions, then npm publish for OIDC auth
        working-directory: ${{ matrix.workspace }}
        run: |
          # Pack first - this converts workspace:^ to actual versions
          TARBALL=$(pnpm pack | tail -1)
          echo "Publishing tarball: $TARBALL"
          # Publish the tarball (npm for OIDC support)
          npm publish "$TARBALL" --access public --tag $TAG

      - name: Create GitHub Release
        if: matrix.workspace == 'packages/core'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
