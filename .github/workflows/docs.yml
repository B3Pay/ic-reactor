name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**"
      - "llms.txt"
      - "llms-full.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  V3_DOCS_REF: v3.6.0

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Checkout released v3 documentation source
        uses: actions/checkout@v7
        with:
          ref: ${{ env.V3_DOCS_REF }}
          path: v3-docs-source

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build documentation (Astro)
        run: pnpm docs:build

      - name: Install released v3 dependencies
        working-directory: v3-docs-source
        run: pnpm install --frozen-lockfile

      - name: Build released v3 documentation (Astro)
        working-directory: v3-docs-source
        run: pnpm docs:build

      # docs/dist should be Astro static output

      - name: Download existing Pages content
        uses: actions/checkout@v7
        with:
          ref: gh-pages
          path: existing-pages
        continue-on-error: true

      - name: Merge existing + new docs
        run: |
          mkdir -p final-docs

          # Copy existing gh-pages content if exists
          if [ -d "existing-pages" ]; then
            cp -r existing-pages/* final-docs/ 2>/dev/null || true
            rm -rf final-docs/.git
          fi

          # Ensure v2 exists by moving the legacy TypeDoc root into /v2 once.
          if [ ! -d "final-docs/v2" ]; then
            mkdir -p final-docs/v2
            shopt -s dotglob
            for item in final-docs/*; do
              case "$(basename "$item")" in
                v2|v3|llms.txt|llms-full.txt|CNAME|.nojekyll) continue;;
              esac
              mv "$item" final-docs/v2/
            done
            shopt -u dotglob
          fi

          # Replace the published v3 docs with the exact v3.6.0 release build.
          rm -rf final-docs/v3
          mkdir -p final-docs/v3
          cp -r v3-docs-source/docs/dist/* final-docs/v3/

          # v4 is not released. Remove any stale preview documentation.
          rm -rf final-docs/v4

          # Keep canonical llms files available at the site root.
          cp v3-docs-source/llms.txt final-docs/llms.txt
          if [ -f "v3-docs-source/llms-full.txt" ]; then
            cp v3-docs-source/llms-full.txt final-docs/llms-full.txt
          else
            cp llms-full.txt final-docs/llms-full.txt
          fi

          # Normalize the version selector in preserved static versions.
          node << 'NODE'
          const fs = require("node:fs")
          const path = require("node:path")

          const selectorHtml = `<select id="version-select" onchange="handleVersionChange(event)" aria-label="Select version">
                  <option value="v3">v3</option>
                  <option value="v2">v2</option>
                </select>`

          const patchScript = `<script id="ic-reactor-version-selector-patch">
                (function () {
                  var select = document.getElementById("version-select");
                  if (!select) return;
                  var match = window.location.pathname.match(/^\\/(v2|v3)(\\/|$)/);
                  var currentVersion = match ? match[1] : "v3";
                  select.value = currentVersion;
                  select.addEventListener("change", function (event) {
                    var version = event.target.value;
                    var path = window.location.pathname || "/";
                    var nextPath = /^\\/v[23](\\/|$)/.test(path)
                      ? path.replace(/^\\/v[23](?=\\/|$)/, "/" + version)
                      : "/" + version + "/";
                    window.location.href = nextPath + window.location.search + window.location.hash;
                  });
                })();
              </script>`

          const linkRewrites = [
            ["https://ic-reactor.b3pay.net/ic-reactor/", "/v2/"],
            ["ic-reactor.b3pay.net/ic-reactor", "ic-reactor.b3pay.net/v2"],
            ["https://b3pay.github.io/ic-reactor/modules/core.html", "/v3/packages/core/"],
            ["https://b3pay.github.io/ic-reactor/modules/parser.html", "/v3/packages/parser/"],
            ["https://b3pay.github.io/ic-reactor/modules/react.html", "/v3/packages/react/"],
            ["https://b3pay.github.io/ic-reactor/modules/visitor.html", "/v3/packages/candid/"],
            ["https://b3pay.github.io/ic-reactor/", "/v3/"],
          ]

          function walk(dir) {
            if (!fs.existsSync(dir)) return []
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) return walk(fullPath)
              return entry.isFile() && /\.(html|md|mdx)$/.test(entry.name)
                ? [fullPath]
                : []
            })
          }

          for (const file of walk("final-docs")) {
            let html = fs.readFileSync(file, "utf8")

            for (const [from, to] of linkRewrites) {
              html = html.split(from).join(to)
            }

            if (!html.includes('id="version-select"')) {
              fs.writeFileSync(file, html)
              continue
            }

            html = html.replace(
              /<select id="version-select"[\s\S]*?<\/select>/,
              selectorHtml
            )

            if (!html.includes("ic-reactor-version-selector-patch")) {
              html = html.replace("</body>", `${patchScript}\n            </body>`)
            }

            fs.writeFileSync(file, html)
          }
          NODE

          # Preserve CNAME for custom domain
          if [ -f "CNAME" ]; then
            cp CNAME final-docs/CNAME
          fi

          # Root redirect to latest docs
          cat > final-docs/index.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=/v3/" />
              <title>IC Reactor Docs</title>
              <script>
                window.location.replace("/v3/");
              </script>
            </head>
            <body>
              <p>Redirecting to v3 documentation…</p>
            </body>
          </html>
          EOF

          # Smart 404: redirect unknown routes to latest docs preserving path.
          # For versioned misses, fall back to a real root instead of leaving the
          # placeholder page visible forever.
          cat > final-docs/404.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <title>Not Found</title>
              <script>
                (function () {
                  var path = window.location.pathname || "/";
                  if (path.startsWith("/v2")) {
                    window.location.replace("/v2/");
                    return;
                  }
                  if (path.startsWith("/v3")) {
                    window.location.replace("/v3/");
                    return;
                  }
                  window.location.replace("/v3" + path);
                })();
              </script>
            </head>
            <body>
              <p>Redirecting...</p>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: final-docs

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
