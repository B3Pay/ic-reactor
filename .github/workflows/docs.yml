name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "packages/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Build documentation (Astro)
        run: pnpm docs:build

      # docs/dist should be Astro static output

      - name: Download existing Pages content
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: existing-pages
        continue-on-error: true

      - name: Merge existing + new docs
        run: |
          mkdir -p final-docs

          # Copy existing gh-pages content if exists
          if [ -d "existing-pages" ]; then
            cp -r existing-pages/* final-docs/ 2>/dev/null || true
            rm -rf final-docs/.git
          fi

          # Ensure v2 exists (move legacy root content into /v2 once)
          if [ ! -d "final-docs/v2" ]; then
            mkdir -p final-docs/v2
            shopt -s dotglob
            for item in final-docs/*; do
              case "$(basename "$item")" in
                v2|v3|v4|llms.txt) continue;;
              esac
              mv "$item" final-docs/v2/
            done
            shopt -u dotglob
          fi

          # Replace v4 with new Astro build while preserving v2 and v3
          rm -rf final-docs/v4
          mkdir -p final-docs/v4
          cp -r docs/dist/* final-docs/v4/

          # Normalize the version selector in preserved static versions too.
          # This lets existing /v2 and /v3 pages link to the new /v4 docs.
          node << 'NODE'
          const fs = require("node:fs")
          const path = require("node:path")

          const selectorHtml = `<select id="version-select" onchange="handleVersionChange(event)" aria-label="Select version">
                  <option value="v4">v4</option>
                  <option value="v3">v3</option>
                  <option value="v2">v2</option>
                </select>`

          const patchScript = `<script id="ic-reactor-version-selector-patch">
                (function () {
                  var select = document.getElementById("version-select");
                  if (!select) return;
                  var match = window.location.pathname.match(/^\\/(v2|v3|v4)(\\/|$)/);
                  var currentVersion = match ? match[1] : "v4";
                  select.value = currentVersion;
                  select.addEventListener("change", function (event) {
                    var version = event.target.value;
                    var path = window.location.pathname || "/";
                    var nextPath = /^\\/v[234](\\/|$)/.test(path)
                      ? path.replace(/^\\/v[234](?=\\/|$)/, "/" + version)
                      : "/" + version + "/";
                    window.location.href = nextPath + window.location.search + window.location.hash;
                  });
                })();
              </script>`

          function walk(dir) {
            if (!fs.existsSync(dir)) return []
            return fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
              const fullPath = path.join(dir, entry.name)
              if (entry.isDirectory()) return walk(fullPath)
              return entry.isFile() && entry.name.endsWith(".html") ? [fullPath] : []
            })
          }

          for (const file of walk("final-docs")) {
            let html = fs.readFileSync(file, "utf8")
            if (!html.includes('id="version-select"')) continue

            html = html.replace(
              /<select id="version-select"[\s\S]*?<\/select>/,
              selectorHtml
            )

            if (!html.includes("ic-reactor-version-selector-patch")) {
              html = html.replace("</body>", `${patchScript}\n            </body>`)
            }

            fs.writeFileSync(file, html)
          }
          NODE

          # Preserve CNAME for custom domain
          if [ -f "CNAME" ]; then
            cp CNAME final-docs/CNAME
          fi

          # Root redirect to latest docs
          cat > final-docs/index.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta http-equiv="refresh" content="0; url=/v4/" />
              <title>IC Reactor Docs</title>
              <script>
                window.location.replace("/v4/");
              </script>
            </head>
            <body>
              <p>Redirecting to v4 documentation…</p>
            </body>
          </html>
          EOF

          # Smart 404: redirect unknown routes to latest docs preserving path
          cat > final-docs/404.html << 'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <title>Not Found</title>
              <script>
                (function () {
                  var path = window.location.pathname || "/";
                  if (path.startsWith("/v2") || path.startsWith("/v3") || path.startsWith("/v4")) return;
                  window.location.replace("/v4" + path);
                })();
              </script>
            </head>
            <body>
              <p>Redirecting…</p>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: final-docs

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
