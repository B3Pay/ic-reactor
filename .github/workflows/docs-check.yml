name: Docs validation (PR)

on:
  pull_request:
    paths:
      - "docs/**"
      - "packages/**"
      - "packages/**/src/content/**"

jobs:
  validate-docs:
    name: MDX lint + docs build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Setup pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.30.3 --activate
          pnpm --version
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: MDX lint
        working-directory: ./docs
        run: pnpm run lint:mdx
      - name: Build docs
        run: pnpm docs:build
